<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">

<title>Sim toolkit</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

<style>
:root {
  --bg: #000000; --surf: #111111; --bord: rgba(255,255,255,0.1);
  --text: #f4f4f5; --accent: #22c55e; --danger: #ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100dvh;overflow:hidden;background:#000;font-family: 'Inter', sans-serif;color:var(--text);}

/* THE BLACKOUT OVERLAY (Total Privacy) */
#blackout-mode {
    position: fixed; inset: 0; background: #000; z-index: 9999;
    display: none; align-items: center; justify-content: center;
}

/* VIDEO PREVIEW BOX (Small & Draggable) */
#preview-box {
    position: fixed; top: 50px; left: 20px; z-index: 10;
    border: 1px solid var(--bord); border-radius: 12px;
    overflow: hidden; background: #111;
    transition: width 0.3s, height 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}
#her-video { width: 100%; height: 100%; object-fit: cover; }

/* HUD */
#hud { position: fixed; inset: 0; z-index: 20; pointer-events: none; transition: opacity 0.3s; }
#hud.hidden { opacity: 0; visibility: hidden; }

#bar-main {
    position: absolute; bottom: calc(30px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    background: rgba(20,20,20,0.8); backdrop-filter: blur(20px);
    padding: 12px 20px; border-radius: 40px; border: 1px solid var(--bord);
    display: flex; align-items:center; gap: 15px; pointer-events: auto;
}

.hbtn {
    width: 50px; height: 50px; border-radius: 50%; border: none;
    display: flex; align-items:center; justify-content:center;
    background: #222; color: #fff; cursor: pointer;
}
.hbtn.danger { background: var(--danger); }
.hbtn.active { color: var(--accent); }

/* SETUP SCREEN */
#setup-screen {
    position: fixed; inset: 0; z-index: 100; background: #000;
    display: flex; flex-direction: column; align-items:center; justify-content: center; padding: 20px;
}
.input-card { width: 100%; max-width: 340px; text-align: center; }
input { 
    width: 100%; padding: 15px; background: #111; border: 1px solid #333; 
    border-radius: 12px; color: #fff; text-align: center; margin-bottom: 15px; font-size: 16px;
}
.start-btn { 
    width: 100%; padding: 15px; background: #fff; color: #000; 
    border-radius: 12px; font-weight: 700; border: none;
}

/* SETTINGS */
#tools-drawer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: #111; border-radius: 20px 20px 0 0; padding: 20px;
    transform: translateY(100%); transition: 0.4s cubic-bezier(0.32,0.72,0,1);
}
#tools-drawer.open { transform: translateY(0); }
.row { display: flex; align-items:center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #222; }
.tog { width: 46px; height: 26px; background: #333; border-radius: 13px; position: relative; }
.tog.on { background: var(--accent); }
.tog::after { content:''; position:absolute; width:20px; height:20px; background:#fff; border-radius:50%; top:3px; left:3px; transition: 0.2s; }
.tog.on::after { left: 23px; }
.slider { width: 100%; height: 6px; background: #333; border-radius: 3px; -webkit-appearance: none; margin-top: 10px; }
.slider::-webkit-slider-thumb { width: 20px; height: 20px; background: #fff; border-radius: 50%; -webkit-appearance: none; }
</style>
</head>
<body onclick="wakeFromBlackout()">

<!-- PRIVACY BLACKOUT -->
<div id="blackout-mode"></div>

<div id="video-container">
    <video id="raw-video" autoplay playsinline muted style="display:none"></video>
    <div id="preview-box" onclick="focusCamera(event)">
        <video id="her-video" autoplay playsinline muted></video>
    </div>
</div>

<div id="setup-screen">
    <div class="input-card">
        <span class="material-symbols-rounded" style="font-size: 60px; color: #333; margin-bottom: 10px;">settings_input_antenna</span>
        <h2 style="margin-bottom: 20px;">Sim Toolkit</h2>
        <input type="text" id="partner-id" placeholder="Enter Receiver ID">
        <button class="start-btn" onclick="startBroadcast()">Connect</button>
        <button onclick="openTools()" style="background:none; border:none; color:#555; margin-top:20px; font-weight:600;">Settings</button>
    </div>
</div>

<div id="hud" class="hidden">
    <div id="bar-main">
        <button class="hbtn" onclick="toggleBlackout()"><span class="material-symbols-rounded">shield</span></button>
        <button class="hbtn" id="btn-mic" onclick="toggleMic()"><span class="material-symbols-rounded">mic</span></button>
        <button class="hbtn" id="btn-spk" onclick="toggleSpk()"><span class="material-symbols-rounded">volume_up</span></button>
        <button class="hbtn" id="btn-torch" onclick="toggleTorch()"><span class="material-symbols-rounded">flashlight_on</span></button>
        <button class="hbtn" id="btn-vid" onclick="togglePreview()"><span class="material-symbols-rounded">visibility</span></button>
        <button class="hbtn" onclick="openTools()"><span class="material-symbols-rounded">settings</span></button>
        <button class="hbtn danger" onclick="endCall()"><span class="material-symbols-rounded">call_end</span></button>
    </div>
</div>

<div id="tools-drawer">
    <div style="width:40px; height:4px; background:#333; margin:0 auto 15px; border-radius:2px;"></div>
    <button id="btn-install" style="width:100%; padding:12px; background:#007bff; color:#fff; border:none; border-radius:10px; margin-bottom:15px; display:none;" onclick="installApp()">Install App</button>
    
    <div class="row"><span>End Call when out of App</span><div class="tog on" id="tog-bg" onclick="this.classList.toggle('on');saveSettings()"></div></div>
    <div class="row"><span>Auto-Answer (Off by default)</span><div class="tog" id="tog-auto" onclick="this.classList.toggle('on');saveSettings()"></div></div>
    
    <div style="padding:15px 0">
        <p>Preview Size (<span id="size-val">3</span>)</p>
        <input type="range" id="sl-size" class="slider" min="1" max="10" value="3" oninput="updateSize(this.value);saveSettings()">
    </div>
    
    <div style="padding:15px 0">
        <p>HUD Auto-Hide (<span id="hide-val">1</span>s)</p>
        <input type="range" id="sl-hide" class="slider" min="1" max="5" value="1" oninput="ge('hide-val').innerText=this.value;saveSettings()">
    </div>
    
    <button class="start-btn" style="margin-top:20px; background:#222; color:var(--danger);" onclick="localStorage.clear();location.reload();">Reset App</button>
</div>

<audio id="remote-audio" autoplay playsinline></audio>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

let defP;
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); defP = e; ge('btn-install').style.display = 'block'; });
async function installApp() { if(!defP) return; defP.prompt(); defP = null; }

const ge = id => document.getElementById(id);
const haptic = () => navigator.vibrate?.(15);

// SETTINGS
const saveSettings = () => {
    localStorage.setItem('she_v3', JSON.stringify({
        bg: ge('tog-bg').classList.contains('on'),
        auto: ge('tog-auto').classList.contains('on'),
        size: ge('sl-size').value,
        hide: ge('sl-hide').value
    }));
    updateSize(ge('sl-size').value);
};

const loadSettings = () => {
    const s = JSON.parse(localStorage.getItem('she_v3') || '{}');
    if(s.bg === false) ge('tog-bg').classList.remove('on');
    if(s.auto) ge('tog-auto').classList.add('on');
    if(s.size) { ge('sl-size').value = s.size; updateSize(s.size); }
    if(s.hide) { ge('sl-hide').value = s.hide; ge('hide-val').innerText = s.hide; }
};

const updateSize = v => {
    ge('size-val').innerText = v;
    const box = ge('preview-box');
    box.style.width = (v * 30) + "px";
    box.style.height = (v * 40) + "px";
};

// BACKGROUND HANDLING
document.addEventListener("visibilitychange", () => {
    if (document.hidden && ge('tog-bg').classList.contains('on')) {
        endCall();
    }
});

// CALL LOGIC
let peer = new Peer();
let currentCall, localStream, videoTrack;

async function startBroadcast() {
    const id = ge('partner-id').value;
    if(!id) return alert("Enter ID");

    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: 1280, height: 720 },
            audio: { sampleRate: 48000, echoCancellation: false }
        });
        videoTrack = localStream.getVideoTracks()[0];
        ge('her-video').srcObject = localStream;
        
        currentCall = peer.call(id, localStream);
        setupCallHandlers(currentCall);
    } catch(e) { alert("Camera failed. Check permissions."); }
}

function setupCallHandlers(call) {
    call.on('stream', rs => {
        ge('remote-audio').srcObject = rs;
        ge('setup-screen').style.display = 'none';
        showHudTemp();
    });
    call.on('close', () => location.reload());
}

// HUD & PRIVACY
let hudTo;
const showHudTemp = () => {
    ge('hud').classList.remove('hidden');
    clearTimeout(hudTo);
    hudTo = setTimeout(() => {
        ge('hud').classList.add('hidden');
    }, ge('sl-hide').value * 1000);
};

// If user clicks screen, show HUD
document.body.addEventListener('touchstart', showHudTemp);

function toggleBlackout() {
    ge('blackout-mode').style.display = 'flex';
}
function wakeFromBlackout() {
    ge('blackout-mode').style.display = 'none';
    showHudTemp();
}

function togglePreview() {
    const box = ge('preview-box');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
    ge('btn-vid').classList.toggle('active');
}

function toggleMic() {
    localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
    ge('btn-mic').classList.toggle('active');
}

function toggleSpk() {
    ge('remote-audio').muted = !ge('remote-audio').muted;
    ge('btn-spk').classList.toggle('active');
}

async function toggleTorch() {
    if(!videoTrack) return;
    const props = videoTrack.getConstraints();
    const torch = !videoTrack.getSettings().torch;
    await videoTrack.applyConstraints({ advanced: [{ torch: torch }] });
    ge('btn-torch').classList.toggle('active', torch);
}

function focusCamera(e) {
    if(!videoTrack) return;
    haptic();
    // Native Android Focus call (where supported)
    videoTrack.applyConstraints({ advanced: [{ focusMode: "continuous" }] }).catch(()=>{});
}

function endCall() { location.reload(); }
function openTools() { ge('tools-drawer').classList.add('open'); }
function closeTools() { ge('tools-drawer').classList.remove('open'); }

// Handle Android Back Gesture
window.addEventListener('popstate', closeTools);
document.body.addEventListener('click', e => {
    if(e.target.id === 'tools-drawer' || e.target.closest('#tools-drawer')) return;
    closeTools();
});

loadSettings();
</script>
</body>
</html>
